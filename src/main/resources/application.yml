server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: order-sync-service

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ordersync}
    username: ${DATABASE_USERNAME:ordersync}
    password: ${DATABASE_PASSWORD:ordersync}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 30000
      pool-name: OrderSyncHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: always
      show-components: always
  info:
    env:
      enabled: true
    build:
      enabled: true

info:
  app:
    name: order-sync-service
    description: Order synchronization service with ERP integration
    version: "@project.version@"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
  show-actuator: false

# ERP Integration
erp:
  base-url: ${ERP_BASE_URL:http://localhost:9090}
  timeout-seconds: ${ERP_TIMEOUT_SECONDS:30}
  sync-path: /api/erp/orders

# Resilience4j — Retry for ERP calls
resilience4j:
  retry:
    instances:
      erp-client:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - com.renan.ordersync.exception.ErpTransientException
        ignore-exceptions:
          - com.renan.ordersync.exception.ErpPermanentException

logging:
  level:
    root: WARN
    com.renan.ordersync: INFO
    org.flywaydb: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
