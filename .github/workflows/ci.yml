name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Cancel previous runs on the same branch/PR to avoid redundant work
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # No separate `postgres` service is needed.
    # Integration tests manage their own PostgreSQL container via Testcontainers
    # (Docker is available on GitHub Actions ubuntu-latest runners by default).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (skip tests)
        run: ./gradlew build -x test --no-daemon

      - name: Run unit tests
        run: ./gradlew test --tests "com.renan.ordersync.mapper.*" --tests "com.renan.ordersync.service.*" --tests "com.renan.ordersync.client.*" --no-daemon

      - name: Run integration tests
        run: ./gradlew test --tests "com.renan.ordersync.integration.*" --no-daemon
        env:
          # Testcontainers will start its own PostgreSQL; no external DB needed.
          # DOCKER_HOST is already set by the Actions runner.
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Generate coverage report
        run: ./gradlew jacocoTestReport --no-daemon
        if: always()

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/
          retention-days: 14

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test/
          retention-days: 14

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/test/
          retention-days: 14
